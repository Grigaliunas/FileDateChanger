name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract changelog notes for this tag
        id: notes
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          awk -v ver="$version" '
            $0 ~ "^## \\[" ver "\\]" { p=1; next }
            p && /^## \[/ { exit }
            p && /^\[[^]]+\]: / { exit }
            p { print }
          ' CHANGELOG.md > RELEASE_NOTES.md
          # Trim leading/trailing blank lines.
          sed -i -e '/./,$!d' RELEASE_NOTES.md
          echo "Extracted notes:"; cat RELEASE_NOTES.md

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          tag="$GITHUB_REF_NAME"
          # Idempotent: do nothing if a release already exists for this tag.
          if gh release view "$tag" >/dev/null 2>&1; then
            echo "Release $tag already exists; skipping."
            exit 0
          fi
          if [ -s RELEASE_NOTES.md ]; then
            gh release create "$tag" --title "$tag" --notes-file RELEASE_NOTES.md --verify-tag --latest
          else
            echo "No changelog section found for $tag; generating notes from commits."
            gh release create "$tag" --title "$tag" --generate-notes --verify-tag --latest
          fi
